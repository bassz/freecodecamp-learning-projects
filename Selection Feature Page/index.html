<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Selection Feature Page</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>Feature Selection</h1>
    <p>Choose your feature select what works for your team</p>
    <div class="feature-card-container">
        <label for="task-tracking" class="feature-card">Task Tracking<input id="task-tracking" type="checkbox"></label>
        <label for="gantt-chart" class="feature-card">Gantt Chart<input id="gantt-chart" type="checkbox"></label>
        <label for="time-tracking" class="feature-card">Time Tracking<input id="time-tracking" type="checkbox"></label>
        <label for="team-chat" class="feature-card">Team Chat<input id="team-chat" type="checkbox"></label>
        <label for="file-storage" class="feature-card">File Storage<input id="file-storage" type="checkbox"></label>
        <label for="analytics" class="feature-card">Analytics<input id="analytics"  type="checkbox"></label>
    </div>
</body>

</html>
