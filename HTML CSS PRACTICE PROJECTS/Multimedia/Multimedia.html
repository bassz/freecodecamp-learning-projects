<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multimedia Player</title>
</head>

<body>
  <h1>Multimedia Player</h1>
  <section>
    <h2>Now Playing: Overdose Acoustic (inst.) - Natori</h2>
    <audio controls aria-label="audio">
      <source src="https://raw.githubusercontent.com/bassz/Assets/main/Overdose%20Aco%20ver%2024_48%20inst.opus" type="audio/ogg">
      <!-- type attribute ของ source ใช้เป็น video/mpeg ถึงจะเล่นได้ ถ้าใช้แค่ video จะเล่น opus ไม่ได้ ส่วนตัวเราใช้ ogg แทน mpeg เพื่อทดลอง สรุปได้เหมือนกัน-->
    </audio>
  </section>
  <section>
    <h2></h2>
    <video controls aria-label="video" width="480">
      <source src="https://raw.github.com/bassz/Assets/main/Guy%20Staring%20-%20Shark%20Bait%20(720p%2C%20h264).mp4" type="video/mp4">
      <track src="nothing.vtt" kind="caption" srclang="en" label="English">
      <!-- เนื่องจากไม่มี track อะไร เลยไม่ใส่ อันที่ใส่ตัวอย่างจะอยู่ด้านล่างหลัง iframe / จะเป็นของ freecodecamp โดยตรง-->
    </video>

      <!-- เทส iframe ของ youtube ไม่สามารถใช้ใน <video> ได้ -->
      <iframe width="560" height="315" src="https://www.youtube.com/embed/52XqcGgjP_4?si=qo4f_asA6HB-SeIe" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

      <video controls aria-label="video" width="700">
        <source src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.mp4" type="video/mp4">
        <track src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.vtt" kind="caption" srclang="en" label="English">
        <!-- สำหรับ kind attribute ใน track มีประมาณนี้
          subtitles = ซับแปลภาษา (เช่น เสียงอังกฤษ ซับไทย)
          captions = คำบรรยายสำหรับคนหูหนวก/ได้ยินยาก  (มักรวมเสียงประกอบ เช่น [music], [door slams])
          descriptions = คำอธิบายเสียงสำหรับคนตาบอด (audio description)
          chapters = บท/ตอน (ช่วยนำทางไทม์ไลน์)
          metadata = ข้อมูลอื่น ๆ (ไม่ค่อยใช้)
          ส่วน label เป็นชื่อที่โชว์ให้ผู้ใช้เลือกในเมนูซับ เช่น ภาษาไทย, English, にほんご-->
      </video>
  </section>
  <section>
    <h2>Transcript</h2>
    <p>สิ่งที่คุณเห็นในวิดีโอแรกๆคือมีมจ้องหน้ากันพร้อมเพลงประกอบครับ แค่นั้นแหละ ส่วนอันสุดท้ายสาระจาก freecodecamp</p>
</body>

</html>
